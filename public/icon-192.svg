<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="#0f1528"/>
      <stop offset="100%" stop-color="#030308"/>
    </radialGradient>

    <!-- Earth surface gradient -->
    <radialGradient id="earthSurf" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#3a8fd4"/>
      <stop offset="35%" stop-color="#2568a8"/>
      <stop offset="70%" stop-color="#1a4a7d"/>
      <stop offset="100%" stop-color="#0f2d52"/>
    </radialGradient>

    <!-- Dome glass gradient -->
    <radialGradient id="domeGlass" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#c8e4ff" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#7eb8f7" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#4a80c8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#2a5090" stop-opacity="0.02"/>
    </radialGradient>

    <!-- Dome edge highlight -->
    <linearGradient id="domeEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8e4ff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#7eb8f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c8e4ff" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Atmosphere glow -->
    <radialGradient id="atmosGlow" cx="50%" cy="52%" r="40%">
      <stop offset="70%" stop-color="#7eb8f7" stop-opacity="0"/>
      <stop offset="85%" stop-color="#5b9ee0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7eb8f7" stop-opacity="0.25"/>
    </radialGradient>

    <!-- Star glow filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Earth clip -->
    <clipPath id="earthClip">
      <circle cx="96" cy="82" r="34"/>
    </clipPath>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="192" height="192" rx="40" fill="url(#bgGrad)"/>

  <!-- ═══ STARS ═══ -->
  <g fill="#fff" filter="url(#starGlow)">
    <circle cx="28" cy="22" r="1.1" opacity="0.95"/>
    <circle cx="164" cy="30" r="1.4" opacity="1"/>
    <circle cx="52" cy="130" r="0.9" opacity="0.7"/>
    <circle cx="148" cy="48" r="1" opacity="0.9"/>
    <circle cx="172" cy="107" r="0.8" opacity="0.65"/>
    <circle cx="20" cy="88" r="0.7" opacity="0.55"/>
    <circle cx="133" cy="138" r="0.9" opacity="0.7"/>
    <circle cx="44" cy="42" r="0.85" opacity="0.8"/>
    <circle cx="110" cy="18" r="1" opacity="0.9"/>
    <circle cx="74" cy="26" r="0.6" opacity="0.6"/>
    <!-- Small stars -->
    <circle cx="35" cy="62" r="0.5" opacity="0.45"/>
    <circle cx="180" cy="65" r="0.4" opacity="0.3"/>
    <circle cx="160" cy="145" r="0.5" opacity="0.35"/>
    <circle cx="62" cy="155" r="0.4" opacity="0.25"/>
  </g>

  <!-- ═══ EARTH ═══ -->
  <circle cx="96" cy="82" r="36" fill="#0a1525" opacity="0.5"/>
  <circle cx="96" cy="82" r="34" fill="url(#earthSurf)"/>

  <!-- Continents -->
  <g clip-path="url(#earthClip)" opacity="0.4">
    <path d="M 82 58 Q 80 66 78 74 Q 76 82 80 90 Q 82 96 78 106" fill="none" stroke="#2ecc71" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <path d="M 85 60 Q 88 65 86 70" fill="none" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M 102 54 Q 104 62 103 72 Q 101 80 104 90 Q 106 98 103 108" fill="none" stroke="#2ecc71" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
    <path d="M 106 56 Q 110 58 112 62" fill="none" stroke="#2ecc71" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M 114 55 Q 120 62 122 70 Q 124 78 120 84" fill="none" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <path d="M 118 96 Q 122 100 120 104" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Ocean specular -->
  <circle cx="88" cy="70" r="9" fill="#fff" opacity="0.04"/>

  <!-- Atmosphere rim -->
  <circle cx="96" cy="82" r="35.5" fill="none" stroke="#5bb8f7" stroke-width="1.2" opacity="0.2"/>

  <!-- ═══ CRYSTAL DOME ═══ -->
  <path d="M 52 82 A 44 44 0 0 1 140 82" fill="url(#domeGlass)" stroke="url(#domeEdge)" stroke-width="1"/>

  <!-- Geodesic grid lines -->
  <g stroke="#7eb8f7" fill="none" opacity="0.12" stroke-width="0.5">
    <path d="M 96 38 Q 96 60 96 82"/>
    <path d="M 73 42 Q 75 62 73 82"/>
    <path d="M 119 42 Q 117 62 119 82"/>
    <path d="M 60 55 Q 63 68 58 82"/>
    <path d="M 132 55 Q 129 68 134 82"/>
    <!-- Parallels -->
    <path d="M 62 58 Q 96 48 130 58"/>
    <path d="M 55 70 Q 96 58 137 70"/>
  </g>

  <!-- Dome specular -->
  <path d="M 74 50 Q 88 44 102 48" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>

  <!-- Dome base ring -->
  <ellipse cx="96" cy="82" rx="44" ry="4.5" fill="none" stroke="#7eb8f7" stroke-width="0.8" opacity="0.3"/>

  <!-- ═══ ORBITAL RING ═══ -->
  <ellipse cx="96" cy="76" rx="62" ry="18" fill="none" stroke="#7eb8f7" stroke-width="0.8" opacity="0.25" transform="rotate(-18, 96, 76)"/>

  <!-- Satellite -->
  <circle cx="148" cy="58" r="2" fill="#7eb8f7" opacity="0.95"/>
  <circle cx="148" cy="58" r="4" fill="#7eb8f7" opacity="0.15"/>
  <circle cx="148" cy="58" r="6.5" fill="#7eb8f7" opacity="0.04"/>

  <!-- Secondary orbit -->
  <ellipse cx="96" cy="78" rx="52" ry="22" fill="none" stroke="#a8d4ff" stroke-width="0.4" opacity="0.1" transform="rotate(40, 96, 78)"/>
  <circle cx="54" cy="66" r="1.2" fill="#a8d4ff" opacity="0.6"/>

  <!-- ═══ ATMOSPHERE GLOW ═══ -->
  <circle cx="96" cy="82" r="44" fill="url(#atmosGlow)"/>

  <!-- ═══ TEXT ═══ -->
  <text x="96" y="142" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif" font-weight="300" font-size="17" letter-spacing="4" fill="#e0e8f5" opacity="0.95">ORBITAL</text>
  <text x="96" y="164" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif" font-weight="700" font-size="19" letter-spacing="6" fill="#7eb8f7">DOME</text>

  <!-- Subtle accent line -->
  <line x1="66" y1="170" x2="126" y2="170" stroke="#7eb8f7" stroke-width="0.5" opacity="0.2"/>
</svg>
