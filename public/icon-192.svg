<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1127"/>
      <stop offset="100%" stop-color="#040408"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#7eb8f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7eb8f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="earthGrad2" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="40%" stop-color="#2d6db5"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </radialGradient>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7eb8f7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7eb8f7" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#a8d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7eb8f7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="earthClip2">
      <circle cx="96" cy="72" r="32"/>
    </clipPath>
    <filter id="sg2">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg2)"/>
  <circle cx="96" cy="72" r="75" fill="url(#glow2)"/>

  <!-- Stars -->
  <g fill="#fff" filter="url(#sg2)">
    <circle cx="28" cy="24" r="1.3" opacity="0.9"/>
    <circle cx="162" cy="30" r="1.5" opacity="1"/>
    <circle cx="52" cy="128" r="1" opacity="0.65"/>
    <circle cx="143" cy="50" r="1.1" opacity="0.8"/>
    <circle cx="172" cy="108" r="0.8" opacity="0.5"/>
    <circle cx="20" cy="88" r="0.7" opacity="0.45"/>
    <circle cx="128" cy="135" r="0.9" opacity="0.45"/>
    <circle cx="46" cy="42" r="0.8" opacity="0.6"/>
    <circle cx="108" cy="20" r="1" opacity="0.75"/>
    <circle cx="170" cy="155" r="0.6" opacity="0.3"/>
  </g>

  <!-- Earth globe -->
  <circle cx="96" cy="72" r="32" fill="url(#earthGrad2)"/>
  <g clip-path="url(#earthClip2)" opacity="0.3">
    <path d="M 84 52 Q 82 60 80 68 Q 78 76 84 82 Q 86 88 82 96" fill="none" stroke="#3ddc84" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 100 50 Q 103 58 102 66 Q 100 74 103 82 Q 105 88 102 96" fill="none" stroke="#3ddc84" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>
  <circle cx="96" cy="72" r="33.5" fill="none" stroke="#7eb8f7" stroke-width="1.5" opacity="0.15"/>

  <!-- Orbital ring -->
  <ellipse cx="96" cy="72" rx="60" ry="18" fill="none" stroke="url(#ringGrad2)" stroke-width="1.2" transform="rotate(-20, 96, 72)"/>

  <!-- Satellite -->
  <circle cx="144" cy="56" r="2.5" fill="#7eb8f7" opacity="0.9"/>
  <circle cx="144" cy="56" r="5" fill="#7eb8f7" opacity="0.12"/>

  <!-- Text -->
  <text x="96" y="138" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="300" font-size="17" letter-spacing="4" fill="#e0e8f5" opacity="0.95">ORBITAL</text>
  <text x="96" y="160" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="19" letter-spacing="6" fill="#7eb8f7">DOME</text>
</svg>
