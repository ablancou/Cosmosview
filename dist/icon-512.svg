<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1127"/>
      <stop offset="100%" stop-color="#040408"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#7eb8f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7eb8f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="domeGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a8d4ff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#5b8fd9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3a5f9e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7eb8f7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7eb8f7" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#a8d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7eb8f7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="earthGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="40%" stop-color="#2d6db5"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </radialGradient>
    <clipPath id="earthClip">
      <circle cx="256" cy="200" r="82"/>
    </clipPath>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>

  <!-- Subtle ambient glow -->
  <circle cx="256" cy="200" r="200" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="#fff" filter="url(#starGlow)">
    <circle cx="75" cy="65" r="2.2" opacity="0.9"/>
    <circle cx="430" cy="85" r="2.5" opacity="1"/>
    <circle cx="145" cy="340" r="1.8" opacity="0.7"/>
    <circle cx="380" cy="135" r="2" opacity="0.85"/>
    <circle cx="455" cy="290" r="1.5" opacity="0.6"/>
    <circle cx="55" cy="240" r="1.3" opacity="0.55"/>
    <circle cx="350" cy="370" r="1.8" opacity="0.7"/>
    <circle cx="125" cy="115" r="1.6" opacity="0.75"/>
    <circle cx="465" cy="410" r="1.2" opacity="0.45"/>
    <circle cx="285" cy="55" r="1.8" opacity="0.85"/>
    <circle cx="95" cy="165" r="1" opacity="0.45"/>
    <circle cx="195" cy="75" r="0.9" opacity="0.4"/>
    <circle cx="390" cy="45" r="1.1" opacity="0.5"/>
    <circle cx="445" cy="195" r="1" opacity="0.45"/>
    <circle cx="65" cy="390" r="0.9" opacity="0.35"/>
    <circle cx="480" cy="145" r="0.7" opacity="0.3"/>
    <circle cx="45" cy="320" r="0.9" opacity="0.4"/>
    <circle cx="410" cy="430" r="1" opacity="0.35"/>
    <circle cx="170" cy="430" r="0.8" opacity="0.3"/>
    <circle cx="310" cy="45" r="0.6" opacity="0.25"/>
  </g>

  <!-- Dome shell (hemisphere) -->
  <path d="M 130 260 A 126 126 0 0 1 382 260" fill="url(#domeGrad)" stroke="#7eb8f7" stroke-width="1.5" opacity="0.4"/>

  <!-- Earth globe -->
  <circle cx="256" cy="200" r="82" fill="url(#earthGrad)"/>

  <!-- Continents (simplified) -->
  <g clip-path="url(#earthClip)" opacity="0.35">
    <!-- Americas -->
    <path d="M 225 145 Q 220 160 215 175 Q 210 190 220 205 Q 225 215 218 235 Q 215 245 220 260" fill="none" stroke="#3ddc84" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <!-- Europe/Africa -->
    <path d="M 265 140 Q 270 155 268 170 Q 265 185 270 200 Q 275 215 270 240 Q 268 255 275 270" fill="none" stroke="#3ddc84" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
    <!-- Asia hint -->
    <path d="M 290 150 Q 305 160 310 175 Q 315 185 305 195" fill="none" stroke="#3ddc84" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Atmosphere rim -->
  <circle cx="256" cy="200" r="84" fill="none" stroke="#7eb8f7" stroke-width="3" opacity="0.2"/>
  <circle cx="256" cy="200" r="88" fill="none" stroke="#7eb8f7" stroke-width="1.5" opacity="0.08"/>

  <!-- Orbital ring 1 (main) -->
  <ellipse cx="256" cy="200" rx="155" ry="45" fill="none" stroke="url(#ringGrad)" stroke-width="2" transform="rotate(-20, 256, 200)"/>

  <!-- Orbital ring glow -->
  <ellipse cx="256" cy="200" rx="155" ry="45" fill="none" stroke="#7eb8f7" stroke-width="6" opacity="0.06" filter="url(#orbGlow)" transform="rotate(-20, 256, 200)"/>

  <!-- Satellite dot on main orbit -->
  <circle cx="380" cy="155" r="4.5" fill="#7eb8f7" opacity="0.95"/>
  <circle cx="380" cy="155" r="9" fill="#7eb8f7" opacity="0.15"/>
  <circle cx="380" cy="155" r="14" fill="#7eb8f7" opacity="0.05"/>

  <!-- Second orbital ring (subtle) -->
  <ellipse cx="256" cy="200" rx="130" ry="65" fill="none" stroke="#7eb8f7" stroke-width="0.8" opacity="0.12" transform="rotate(35, 256, 200)"/>

  <!-- Second satellite -->
  <circle cx="155" cy="175" r="2.5" fill="#a8d4ff" opacity="0.7"/>

  <!-- Text: ORBITAL -->
  <text x="256" y="380" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-weight="300" font-size="52" letter-spacing="12" fill="#e0e8f5" opacity="0.95">ORBITAL</text>

  <!-- Text: DOME -->
  <text x="256" y="435" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-weight="700" font-size="58" letter-spacing="18" fill="#7eb8f7">DOME</text>

  <!-- Subtle bottom accent line -->
  <line x1="175" y1="452" x2="337" y2="452" stroke="#7eb8f7" stroke-width="1" opacity="0.25"/>
</svg>
